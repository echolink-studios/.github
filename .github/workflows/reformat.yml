name: Reformat

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: reformat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Prettier Action
        uses: creyD/prettier_action@v4.6
        with:
          prettier_options: --write **/*.{ts,md,json}
          only_changed_pr: true
