name: Notify Derived Repos

on:
  workflow_call:
    secrets:
      TEMPLATE_SYNC_TOKEN:
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch template-sync to derived repos
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            console.log(`Template branch "${branch}" was updated.`);
            console.log(`Scanning org repos for template-sync.yml workflow...`);

            // List all org repos and check each one for the template-sync workflow
            // via the Contents API. This is always accurate (no search index delay)
            // and avoids the deprecated code search endpoint.
            const SKIP = new Set(['templates', '.github']);
            const allRepos = await github.paginate(github.rest.repos.listForOrg, {
              org: 'echolink-studios',
              per_page: 100
            });

            const checks = await Promise.allSettled(
              allRepos
                .filter(r => !SKIP.has(r.name))
                .map(r =>
                  github.rest.repos.getContent({
                    owner: 'echolink-studios',
                    repo: r.name,
                    path: '.github/workflows/template-sync.yml'
                  }).then(() => r)
                )
            );

            const targetRepos = checks
              .filter(r => r.status === 'fulfilled')
              .map(r => r.value);

            console.log(`Found ${targetRepos.length} repos with template-sync workflow:`);
            targetRepos.forEach(r => console.log(`  - ${r.name}`));

            // Dispatch template-sync event to each repo
            const results = await Promise.allSettled(
              targetRepos.map(repo =>
                github.rest.repos.createDispatchEvent({
                  owner: 'echolink-studios',
                  repo: repo.name,
                  event_type: 'template-sync',
                  client_payload: { branch }
                })
              )
            );

            results.forEach((result, i) => {
              const repo = targetRepos[i].name;
              if (result.status === 'fulfilled') {
                console.log(`  dispatched -> ${repo}`);
              } else {
                console.log(`  failed -> ${repo}: ${result.reason.message}`);
              }
            });

            console.log(`\nDone. ${results.filter(r => r.status === 'fulfilled').length}/${targetRepos.length} repos notified.`);
