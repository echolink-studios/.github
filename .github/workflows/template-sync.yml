name: Template Sync

on:
  workflow_call:
    inputs:
      upstream_branch:
        description: "The template branch to sync from (e.g., nest-js, angular)"
        required: true
        type: string
    secrets:
      TEMPLATE_SYNC_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          fetch-depth: 0

      - name: Sync with template (pull, commit, push)
        id: sync
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: echolink-studios/templates
          upstream_branch: ${{ inputs.upstream_branch }}
          source_gh_token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          target_gh_token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          pr_branch_name_prefix: chore/template-sync
          pr_commit_msg: "chore(template): sync with upstream template"
          git_remote_pull_params: "--allow-unrelated-histories --strategy=recursive -X theirs"
          steps: "prechecks,pull,commit,push"

      - name: Find sync branch and create PR
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
        run: |
          BASE="${{ github.event.repository.default_branch }}"
          TITLE="chore: sync with template"
          LABEL="template-sync"
          HASH="${{ steps.sync.outputs.template_git_hash }}"
          BODY="Merge changes from template repository (\`${{ inputs.upstream_branch }}\` branch).

          Template commit: \`${HASH}\`"

          # Find the sync branch that was pushed
          BRANCH=$(git branch -r --list "origin/chore/template-sync*" --sort=-committerdate | head -1 | sed 's|origin/||' | xargs)

          if [ -z "$BRANCH" ]; then
            echo "No sync branch found. Nothing to do (repo is already up to date)."
            exit 0
          fi

          echo "Found sync branch: $BRANCH"

          # Check if there are actual differences vs the base branch
          DIFF=$(gh api "repos/${{ github.repository }}/compare/${BASE}...${BRANCH}" --jq '.total_commits' 2>/dev/null || echo "0")

          if [ "$DIFF" = "0" ]; then
            echo "No commits ahead of $BASE. Nothing to PR."
            exit 0
          fi

          echo "$DIFF commit(s) ahead of $BASE."

          # Ensure label exists
          gh label create "$LABEL" --color "0E8A16" --description "Automated template sync" 2>/dev/null || true

          # Check if PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base "$BASE" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists. Updating..."
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body "$BODY"
          else
            echo "Creating new PR: $BRANCH -> $BASE"
            gh pr create --base "$BASE" --head "$BRANCH" --title "$TITLE" --body "$BODY" --label "$LABEL"
          fi
