name: Template Sync

on:
  workflow_call:
    inputs:
      upstream_branch:
        description: "The template branch to sync from (e.g., nest-js, angular)"
        required: true
        type: string
    secrets:
      TEMPLATE_SYNC_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          fetch-depth: 0

      - name: Sync and create PR
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          TEMPLATE_REPO="https://x-access-token:${GH_TOKEN}@github.com/echolink-studios/templates.git"
          UPSTREAM_BRANCH="${{ inputs.upstream_branch }}"
          BASE="${{ github.event.repository.default_branch }}"
          SYNC_BRANCH="chore/template-sync"
          LABEL="template-sync"
          TITLE="chore: sync with template"
          IGNORE_FILE=".templatesyncignore"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add template as remote and fetch
          git remote add template "$TEMPLATE_REPO" 2>/dev/null || git remote set-url template "$TEMPLATE_REPO"
          git fetch template "$UPSTREAM_BRANCH"
          TEMPLATE_HASH=$(git rev-parse template/"$UPSTREAM_BRANCH")
          echo "Template hash: $TEMPLATE_HASH"

          # Create sync branch from current base
          git checkout -B "$SYNC_BRANCH" "origin/$BASE"

          # Merge template branch (no squash = proper merge history)
          if ! git merge template/"$UPSTREAM_BRANCH" \
            --allow-unrelated-histories \
            --strategy=recursive \
            -X theirs \
            --no-edit \
            -m "chore(template): merge template ${UPSTREAM_BRANCH} (${TEMPLATE_HASH:0:7})"; then
            echo "Merge had conflicts. Resolving by accepting all changes..."
            # For modify/delete conflicts: accept theirs (keep template's version)
            git checkout --theirs . 2>/dev/null || true
            git add -A
            git commit --no-edit
          fi

          # Restore ignored files from base branch
          if [ -f "$IGNORE_FILE" ]; then
            echo "Restoring files from $IGNORE_FILE..."
            while IFS= read -r pattern || [ -n "$pattern" ]; do
              # Skip empty lines and comments
              [[ -z "$pattern" || "$pattern" == \#* ]] && continue
              # If file exists in base: restore it (undo template changes)
              # If file doesn't exist in base: remove it (undo template addition)
              if ! git checkout "origin/$BASE" -- $pattern 2>/dev/null; then
                git rm -rf --ignore-unmatch $pattern 2>/dev/null || true
              fi
            done < "$IGNORE_FILE"
            # Commit the ignore restorations as a separate fixup
            git add -A
            git diff --cached --quiet || git commit -m "chore(template): restore ignored files"
          fi

          # Check if there are actual differences vs base
          if git diff --quiet "origin/$BASE" HEAD; then
            echo "No differences after merge. Repo is already up to date."
            exit 0
          fi

          # Force push sync branch
          git push origin "$SYNC_BRANCH" --force
          echo "Pushed $SYNC_BRANCH"

          # Build PR body
          BODY="Merge changes from template repository (\`${UPSTREAM_BRANCH}\` branch).

          Template commit: \`${TEMPLATE_HASH:0:7}\`"

          # Ensure label exists
          gh label create "$LABEL" --color "0E8A16" --description "Automated template sync" 2>/dev/null || true

          # Create or update PR
          EXISTING_PR=$(gh pr list --head "$SYNC_BRANCH" --base "$BASE" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists. Updating..."
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body "$BODY"
          else
            echo "Creating new PR: $SYNC_BRANCH -> $BASE"
            gh pr create --base "$BASE" --head "$SYNC_BRANCH" --title "$TITLE" --body "$BODY" --label "$LABEL"
          fi
